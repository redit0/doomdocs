name: Deploy Static HTML to Azure App Service
 
on:
  push:
    branches:
      - main  # Change to your target branch if needed
 
jobs:
  deploy:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'doomdocs'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E314694CD5324F45AE26B8AAAF2D0BAC }}
          package: ./index.html  # Change path if your file lives elsewhere
